name: Reels Poster

on:
  schedule:
    # 21:00 UTC = 2:00 PM PDT — daily check (schedule file controls actual post days)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      reel_num:
        description: 'Force-post reel number (leave blank for scheduled)'
        required: false
      dry_run:
        description: 'Dry run (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  post-reel:
    runs-on: ubuntu-latest
    # Reels take longer — give it 15 minutes max
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run reels poster
        env:
          PAGE_TOKEN:  ${{ secrets.PAGE_TOKEN }}
          IG_ID:       ${{ secrets.IG_ID }}
          REPO_OWNER:  ${{ github.repository_owner }}
          REPO_NAME:   ${{ github.event.repository.name }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.reel_num }}" ]; then
            ARGS="--post ${{ github.event.inputs.reel_num }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python reels_poster.py $ARGS

      - name: Commit state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reels_state.json || true
          git diff --cached --quiet || git commit -m "chore: update reels_state.json [skip ci]"
          git push || true

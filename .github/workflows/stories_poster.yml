name: Stories Poster

on:
  schedule:
    # 10 times daily (UTC) = 6AM–3PM PDT (PDT = UTC-7)
    - cron: '0 13 * * *'   #  6:00 AM PDT
    - cron: '0 14 * * *'   #  7:00 AM PDT
    - cron: '0 15 * * *'   #  8:00 AM PDT
    - cron: '0 16 * * *'   #  9:00 AM PDT
    - cron: '0 17 * * *'   # 10:00 AM PDT
    - cron: '0 18 * * *'   # 11:00 AM PDT
    - cron: '0 19 * * *'   # 12:00 PM PDT
    - cron: '0 20 * * *'   #  1:00 PM PDT
    - cron: '0 21 * * *'   #  2:00 PM PDT
    - cron: '0 22 * * *'   #  3:00 PM PDT
  workflow_dispatch:
    inputs:
      story_num:
        description: 'Force-post a specific story number (optional)'
        required: false
      count:
        description: 'How many stories to post in a row (default 1, use 10 to catch up a full day)'
        required: false
        default: '1'
      dry_run:
        description: 'Dry run (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run stories poster
        env:
          PAGE_TOKEN:  ${{ secrets.PAGE_TOKEN }}
          IG_ID:       ${{ secrets.IG_ID }}
          REPO_OWNER:  ${{ github.repository_owner }}
          REPO_NAME:   ${{ github.event.repository.name }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.story_num }}" ]; then
            ARGS="--post ${{ github.event.inputs.story_num }}"
            python stories_poster.py $ARGS
          else
            COUNT="${{ github.event.inputs.count }}"
            COUNT="${COUNT:-1}"
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              ARGS="--dry-run"
            fi
            for i in $(seq 1 $COUNT); do
              echo "--- Run $i of $COUNT ---"
              python stories_poster.py $ARGS
            done
          fi

      - name: Commit state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stories_state.json || true
          git diff --cached --quiet || git commit -m "chore: update stories_state.json [skip ci]"
          git push || true

name: Stories Poster

on:
  schedule:
    # 3 times daily (UTC):
    #   14:00 = 7:00 AM PDT
    #   18:00 = 11:00 AM PDT
    #   22:00 = 3:00 PM PDT
    - cron: '0 14 * * *'
    - cron: '0 18 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      story_num:
        description: 'Force-post story number (leave blank for scheduled)'
        required: false
      dry_run:
        description: 'Dry run (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run stories poster
        env:
          PAGE_TOKEN:  ${{ secrets.PAGE_TOKEN }}
          IG_ID:       ${{ secrets.IG_ID }}
          REPO_OWNER:  ${{ github.repository_owner }}
          REPO_NAME:   ${{ github.event.repository.name }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.story_num }}" ]; then
            ARGS="--post ${{ github.event.inputs.story_num }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python stories_poster.py $ARGS

      - name: Commit state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stories_state.json || true
          git diff --cached --quiet || git commit -m "chore: update stories_state.json [skip ci]"
          git push || true

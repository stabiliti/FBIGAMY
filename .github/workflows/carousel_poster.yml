name: Carousel Poster

on:
  schedule:
    # 18:30 UTC = 11:30 AM PDT — daily
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      post_num:
        description: 'Force-post carousel number (leave blank for scheduled)'
        required: false
      dry_run:
        description: 'Dry run (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write   # needed to commit state file back to repo

jobs:
  post-carousel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run carousel poster
        env:
          PAGE_TOKEN:  ${{ secrets.PAGE_TOKEN }}
          IG_ID:       ${{ secrets.IG_ID }}
          REPO_OWNER:  ${{ github.repository_owner }}
          REPO_NAME:   ${{ github.event.repository.name }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.post_num }}" ]; then
            ARGS="--post ${{ github.event.inputs.post_num }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python carousel_poster.py $ARGS

      - name: Commit state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add carousel_state.json || true
          git diff --cached --quiet || git commit -m "chore: update carousel_state.json [skip ci]"
          git push || true
